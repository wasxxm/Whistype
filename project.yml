name: Whistype
options:
  bundleIdPrefix: com.innowazi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.16.0"
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"
  Qwen3ASR:
    url: https://github.com/ivan-digital/qwen3-asr-swift
    revision: e85f7cd885b26830b9714570a57e92e60ba05271

targets:
  Whistype:
    type: application
    platform: macOS
    sources:
      - Sources/Whistype
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innowazi.Whistype
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Whistype.entitlements
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
        # Sign every build (Debug and Release) with the same Developer ID
        # Application cert as the shipping DMG. macOS keys Accessibility
        # permissions to the cert's designated requirement, so aligning
        # signing identities makes one AX grant carry across local rebuilds
        # AND released versions, instead of expiring on every cert rotation.
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 3426FSU868
        CODE_SIGN_IDENTITY: "Developer ID Application"
        OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: HotKey
      - package: Qwen3ASR
        product: Qwen3ASR
      - package: Qwen3ASR
        product: ParakeetASR
    entitlements:
      path: Whistype.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
