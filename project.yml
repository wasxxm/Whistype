name: Whistype
options:
  bundleIdPrefix: com.innowazi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.1"
  Qwen3ASR:
    url: https://github.com/ivan-digital/qwen3-asr-swift
    branch: main

targets:
  Whistype:
    type: application
    platform: macOS
    sources:
      - Sources/Whistype
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.innowazi.Whistype
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Whistype.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 3426FSU868
        CODE_SIGN_IDENTITY: "Apple Development"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: HotKey
      - package: Qwen3ASR
        product: Qwen3ASR
    entitlements:
      path: Whistype.entitlements
